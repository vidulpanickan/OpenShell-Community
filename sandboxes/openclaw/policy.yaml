version: 1

# --- Sandbox setup configuration (queried once at startup) ---

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /app
    - /etc
    - /var/log
  read_write:
    - /sandbox
    - /tmp
    - /dev/null

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

# --- Network policies (queried per-CONNECT request) ---
#
# Each named policy maps a set of allowed (binary, endpoint) pairs.
# Binary identity is resolved via /proc/net/tcp inode lookup + /proc/{pid}/exe.
# Ancestors (/proc/{pid}/status PPid walk) and cmdline paths are also matched.
# SHA256 integrity is enforced in Rust via trust-on-first-use, not here.

network_policies:
  claude_code:
    name: claude_code
    endpoints:
      - { host: api.anthropic.com, port: 443, protocol: rest, enforcement: enforce, access: full, tls: terminate }
      - { host: statsig.anthropic.com, port: 443 }
      - { host: sentry.io, port: 443 }
      - { host: raw.githubusercontent.com, port: 443 }
      - { host: platform.claude.com, port: 443 }
    binaries:
      - { path: /usr/local/bin/claude }
      - { path: /usr/bin/node }
  gitlab:
    name: gitlab
    endpoints:
      - { host: gitlab.com, port: 443 }
      - { host: gitlab.mycorp.com, port: 443 }
    binaries:
      - { path: /usr/bin/glab }
  github:
    name: github
    endpoints:
      - host: github.com
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        rules:
          # Git Smart HTTP read-only: allow clone, fetch, pull
          # Discovery (query string is included in path matching)
          - allow:
              method: GET
              path: "/**/info/refs*"
          # Data transfer for reads (all repos)
          - allow:
              method: POST
              path: "/**/git-upload-pack"
          # Data transfer for writes (alpha-claw only)
          - allow:
              method: POST
              path: "/johntmyers/alpha-claw*/git-receive-pack"
    binaries:
      - { path: /usr/bin/git }
  nvidia:
    name: nvidia
    endpoints:
      - { host: integrate.api.nvidia.com, port: 443 }
    binaries:
      - { path: /usr/bin/curl }
      - { path: /bin/bash }
      - { path: /usr/local/bin/opencode }
  nvidia_web:
    name: nvidia_web
    endpoints:
      - { host: nvidia.com, port: 443 }
      - { host: www.nvidia.com, port: 443 }
    binaries:
      - { path: /usr/bin/curl }

  # --- GitHub repo-scoped policy (L7, TLS-terminated) ---
  # Combined policy for api.github.com to avoid OPA complete-rule conflict.
  #   - johntmyers/alpha-claw: full access (all methods including DELETE)
  #   - johntmyers/bravo-claw: read-only + create/edit issues
  github_repos:
    name: github_repos
    endpoints:
      - host: api.github.com
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        rules:
          # Read-only access to all GitHub API paths
          - allow:
              method: GET
              path: "/**"
          - allow:
              method: HEAD
              path: "/**"
          - allow:
              method: OPTIONS
              path: "/**"
          # GraphQL API (used by gh CLI for most operations)
          # - allow:
          #    method: POST
          #    path: "/graphql"
          # alpha-claw: full write access
          - allow:
              method: "*"
              path: "/repos/johntmyers/alpha-claw/**"
          # bravo-claw: create + edit issues
          - allow:
              method: POST
              path: "/repos/johntmyers/bravo-claw/issues"
          - allow:
              method: PATCH
              path: "/repos/johntmyers/bravo-claw/issues/*"
    binaries:
      - { path: /usr/local/bin/claude }
      - { path: /usr/bin/gh }

  vscode:
    name: vscode
    endpoints:
      - { host: update.code.visualstudio.com, port: 443 }
      - { host: "*.vo.msecnd.net", port: 443 }
      - { host: vscode.download.prss.microsoft.com, port: 443 }
      - { host: marketplace.visualstudio.com, port: 443 }
      - { host: "*.gallerycdn.vsassets.io", port: 443 }
    binaries:
      - { path: /usr/bin/curl }
      - { path: /usr/bin/wget }
      - { path: "/sandbox/.vscode-server/**" }
      - { path: "/sandbox/.vscode-remote-containers/**" }

  # --- Private network access (allowed_ips demo) ---
  # Allows any binary to reach services on the k3s cluster pod network
  # (10.42.0.0/16). Without allowed_ips, the proxy's SSRF check blocks
  # all connections to private RFC 1918 addresses.
  cluster_pods:
    name: cluster_pods
    endpoints:
      - port: 8080
        allowed_ips:
          - "10.42.0.0/16"
    binaries:
      - { path: "/**" }

inference:
  allowed_routes:
    - local
