<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NeMoClaw UI — Preview</title>
  <link rel="stylesheet" href="./nemoclaw-devx.css" />
  <style>
    /* Minimal shell so extension can inject (no full OpenClaw styles). */
    :root { --radius-full: 9999px; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; }
    .shell { display: flex; flex-direction: column; min-height: 100vh; }
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 16px; border-bottom: 1px solid #e5e7eb; background: #fff;
    }
    .topbar-status { display: flex; align-items: center; gap: 12px; }
    .main-row { display: flex; flex: 1; min-height: 0; }
    aside.nav {
      width: 220px; border-right: 1px solid #e5e7eb; background: #f9fafb;
      padding: 12px 0;
    }
    .nav-group { margin-bottom: 8px; }
    .nav-label { width: 100%; text-align: left; padding: 8px 12px; border: none; background: none; cursor: pointer; font-weight: 600; }
    .nav-group__items { padding-left: 12px; }
    .nav-item { display: block; padding: 6px 12px; color: #374151; text-decoration: none; font-size: 14px; }
    .nav-item:hover { background: #e5e7eb; }
    main.content { flex: 1; padding: 24px; overflow: auto; background: #fff; }
    .chat-compose { padding: 12px 16px; border-top: 1px solid #e5e7eb; background: #f9fafb; }
    .chat-compose__actions { display: flex; align-items: center; gap: 8px; }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <span class="topbar__title">NeMoClaw UI Preview</span>
      <div class="topbar-status"></div>
    </header>
    <div class="main-row">
      <aside class="nav">
        <div class="nav-group">
          <button type="button" class="nav-label">OpenClaw</button>
          <div class="nav-group__items">
            <a class="nav-item" href="#">Chat</a>
          </div>
        </div>
      </aside>
      <main class="content">
        <p>Content area. Use the sidebar to open <strong>Sandbox Policy</strong> or <strong>Inference</strong>.</p>
      </main>
    </div>
    <div class="chat-compose">
      <div class="chat-compose__actions">
        <button type="button">Send</button>
      </div>
    </div>
  </div>
  <script>
    if (!new URL(document.URL).searchParams.get('preview')) {
      location.replace(location.pathname + '?preview=1' + (location.hash || ''));
    }
  </script>
  <script type="module" src="./nemoclaw-devx.js"></script>
</body>
</html>
